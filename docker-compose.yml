version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: goatbot-backend
    ports:
      - "8000:8000"
    environment:
      - STREAMLIT_URL=http://localhost:8501
    volumes:
      - ./chat_sessions.db:/app/chat_sessions.db
    networks:
      - goatbot-network
    restart: unless-stopped

  streamlit-chat:
    build:
      context: .
      dockerfile: streamlit-chat/Dockerfile
    container_name: goatbot-streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./chat_sessions.db:/app/chat_sessions.db
    networks:
      - goatbot-network
    restart: unless-stopped
    depends_on:
      - backend

networks:
  goatbot-network:
    driver: bridge
