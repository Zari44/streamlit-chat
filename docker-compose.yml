version: '3.8'

services:
  caddy:
    image: caddy:latest
    container_name: goatbot-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    command: caddy run --config /etc/caddy/Caddyfile --watch
    networks:
      - goatbot-network
    restart: unless-stopped
    depends_on:
      - backend
      - streamlit-chat

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: goatbot-backend
    environment:
      - STREAMLIT_URL=http://streamlit-chat:8501
    volumes:
      - ./chat_sessions.db:/data/chat_sessions.db
      - ./backend:/app/backend
      - ./shared:/app/shared
      - ./pyproject.toml:/app/pyproject.toml
      - ./uv.lock:/app/uv.lock
    networks:
      - goatbot-network
    restart: unless-stopped

  streamlit-chat:
    build:
      context: .
      dockerfile: streamlit-chat/Dockerfile
    container_name: goatbot-streamlit
    volumes:
      - ./chat_sessions.db:/data/chat_sessions.db
      - ./streamlit-chat:/app/streamlit-chat
      - ./shared:/app/shared
      - ./pyproject.toml:/app/pyproject.toml
      - ./uv.lock:/app/uv.lock
    networks:
      - goatbot-network
    restart: unless-stopped
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: goatbot-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - goatbot-network
    restart: unless-stopped

networks:
  goatbot-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  grafana_data:
