services:
  caddy:
    build:
      context: .
      dockerfile: caddy/Dockerfile
    image: goatbot-caddy:latest
    container_name: goatbot-caddy
    pull_policy: never
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    env_file:
      - .env.caddy
    command: caddy run --config /etc/caddy/Caddyfile --watch
    networks:
      - goatbot-network
    restart: unless-stopped
    depends_on:
      - backend
      - streamlit-chat

  backend:
    image: goatbot-backend:latest
    pull_policy: never
    container_name: goatbot-backend
    env_file:
      - .env.backend
    volumes:
      - ./chat_sessions.db:/data/chat_sessions.db
    networks:
      - goatbot-network
    restart: unless-stopped

  streamlit-chat:
    image: goatbot-streamlit:latest
    pull_policy: never
    container_name: goatbot-streamlit
    env_file:
      - .env.chat
    volumes:
      - ./chat_sessions.db:/data/chat_sessions.db
    networks:
      - goatbot-network
    restart: unless-stopped
    depends_on:
      - backend

networks:
  goatbot-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
